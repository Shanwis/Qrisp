name: Changelog Check

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check changelog-dev.rst for entries
        id: check
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }}...HEAD | \
             grep -q "documentation/source/general/changelog/changelog-dev.rst"; then
            echo "modified=true" >> "$GITHUB_OUTPUT"
          else
            echo "modified=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if no changelog entry
        if: steps.check.outputs.modified == 'false'
        run: |
          echo "::warning::No changelog entry found - please add an entry to documentation/source/general/changelog/changelog-dev.rst"
          exit 1
